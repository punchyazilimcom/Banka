name: CI

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
    branches: [main]

# Electron binary indirmesini atla (CI'da .exe paketlemiyoruz, sadece TS derliyoruz)
env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

jobs:
  verify:
    name: Tip kontrolü · Testler · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node 20 kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Tip kontrolü (tüm paketler)
        run: npm run typecheck

      - name: Testler (shared + worker + backend)
        run: npm test

      - name: Core UI build
        run: npm run build --workspace=@gtt/core

      - name: Electron ana süreç derleme
        run: npm run build:electron --workspace=@gtt/desktop
